<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulsePlus Live Results</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:900px;
margin:auto;
margin-top:100px;
}

.bar{
height:40px;
background:#333;
margin:25px 0;
border-radius:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#2ecc71;
width:50%;
transition:width 1s;
}

h1{
font-size:48px;
margin-bottom:60px;
}

</style>

</head>

<body>

<h1>PULSEPLUS LIVE RESULTS</h1>

<div class="container">

<h2>Candidate A — 45,210</h2>
<div class="bar">
<div class="fill" style="width:60%"></div>
</div>

<h2>Candidate B — 39,842</h2>
<div class="bar">
<div class="fill" style="width:40%"></div>
</div>

</div>

</body>
</html>
