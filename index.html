<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PulsePlus Live Results</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.wrapper{
width:100%;
max-width:1400px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
font-size:48px;
margin-bottom:60px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
margin-bottom:30px;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.symbol{
width:50px;
height:50px;
background:white;
border-radius:8px;
padding:5px;
}

.name{
font-size:32px;
font-weight:bold;
}

.party{
font-size:18px;
color:#cbd5e1;
}

.votes{
font-size:32px;
font-weight:bold;
}

.bar{
height:30px;
background:#334155;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.fill{
height:100%;
}

.balen{
width:55%;
background:#38bdf8;
}

.oli{
width:45%;
background:#ef4444;
}

.lead{
text-align:center;
font-size:28px;
margin-top:40px;
}

</style>

</head>

<body>

<div class="wrapper">

<h1>PULSEPLUS LIVE RESULTS</h1>

<div class="card">

<div class="row">

<div class="left">
<img src="rsp.png" class="symbol">
<div>
<div class="name">Balen Shah</div>
<div class="party">Rastriya Swatantra Party</div>
</div>
</div>

<div class="votes">52,410</div>

</div>

<div class="bar">
<div class="fill balen"></div>
</div>

</div>


<div class="card">

<div class="row">

<div class="left">
<img src="uml.png" class="symbol">
<div>
<div class="name">KP Oli</div>
<div class="party">CPN-UML</div>
</div>
</div>

<div class="votes">48,210</div>

</div>

<div class="bar">
<div class="fill oli"></div>
</div>

</div>


<div class="lead">
Lead: Balen Shah +4,200
</div>

</div>

</body>
</html>
